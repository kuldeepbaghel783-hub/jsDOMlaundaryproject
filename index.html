
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laundry Service</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav>
    <div class="logo">LaundryPro</div>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact Us</a></li>
        <li><a href="#">About Us</a></li>
    </ul>

    <div class="user-info">
        Welcome, pinu
    </div>
</nav>

<!-- Main Container -->
<div class="container">

    <!-- LEFT SIDE -->
    <div class="left-panel">

        <h2>Selected Services</h2>

        <table>
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Service</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="cartBody">

            </tbody>
        </table>

        <h3>Total: ₹ <span id="total">0</span></h3>

        <div class="booking">
            <h2>Book Service</h2>

            <form id="bookingForm">

                <input type="text" placeholder="Full Name" required>

                <input type="email" placeholder="Email" required>

                <input type="tel" placeholder="Phone Number" required>

                <button type="submit">
                    Book Now
                </button>

            </form>
        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">

        <h2>Browse Our Services</h2>

        <div class="service-card">

            <img id="serviceImage" src="images/dry-cleaning.jpg">

            <h3 id="serviceName">
                Dry Cleaning
            </h3>

            <p id="servicePrice">
                ₹200
            </p>

            <div class="buttons">

                <button onclick="skipService()">
                    Skip Item
                </button>

                <button onclick="addCurrentService()">
                    Add Item
                </button>

            </div>

        </div>

    </div>

</div>

<script src="script.js">



</script>

</body>
</html>
